{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="{% static 'conversationapp/css/theme.css' %}">
  <link rel="stylesheet" href="{% static 'conversationapp/css/base.css' %}">
</head>
<body>
  <div class="card">
    
    {% if erro %}
      <p class="erro-login">{{ erro }}</p>
    {% endif %}

    <form method="post" action="{% url 'home' %}">
      {% csrf_token %}
      <input name="username" type="text" placeholder="Usuario" required>
      <input name="password" type="password" placeholder="Senha" required>
      <button type="submit">Enviar</button>
    </form>
  </div>

  <script src="{% static 'conversationapp/js/base.js' %}"></script>
</body>
</html>
