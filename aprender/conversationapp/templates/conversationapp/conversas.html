{% load static %}
<!DOCTYPE html>

<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel</title>
  <link rel="stylesheet" href="{% static 'conversationapp/css/theme.css' %}?v=7">
  <link rel="stylesheet" href="{% static 'conversationapp/css/conversas.css' %}?v=7">
</head>
<body>
  <aside class="painel-grupos">
    <div class="barra-esquerda">
      {% for grupo in grupos %}
        <button
          type="button"
          class="botao-grupo"
          data-grupo-id="{{ grupo.id }}"
          data-grupo-nome="{{ grupo.nome }}"
        >
          {{ grupo.nome }}
        </button>
      {% empty %}
        <p class="sem-grupos">Voce ainda nao participa de nenhum grupo.</p>
      {% endfor %}
    </div>
  </aside>

  <section class="painel-conversa" data-user-id="{{ request.user.id }}">
    <header class="cabecalho-conversa">
      <button
        id="btn-toggle-grupos"
        class="botao-toggle-grupos"
        type="button"
        aria-label="Ocultar grupos"
        aria-expanded="true"
      ></button>
      <div class="cabecalho-textos">
        <h2 id="titulo-grupo">Selecione um grupo</h2>
        <p id="status-conexao" class="status-conexao">Sem conexao ativa</p>
        <div class="menu-cabecalho">
          <button
            id="btn-menu-tema"
            class="botao-menu-cabecalho"
            type="button"
            aria-label="Abrir menu"
            aria-haspopup="menu"
            aria-expanded="false"
          >
            <span class="icone-hamburguer" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
            </span>
          </button>
          <div id="menu-principal" class="menu-painel" hidden>
            <button
              id="btn-opcao-tema"
              type="button"
              class="menu-opcao"
              aria-haspopup="true"
              aria-expanded="false"
            >
              Tema
            </button>
            <div id="submenu-tema" class="submenu-painel" hidden>
              <button type="button" class="opcao-tema" data-theme="">Padrao</button>
              <button type="button" class="opcao-tema" data-theme="dark">Dark</button>
              <button type="button" class="opcao-tema" data-theme="pink">Pink</button>
            </div>
          </div>
        </div>
      </div>
    </header>

    <main id="lista-mensagens" class="lista-mensagens">
      <p class="mensagem-sistema">Escolha um grupo para ver as mensagens.</p>
    </main>

    <form id="form-mensagem" class="composer">
      {% csrf_token %}
      <input
        id="input-mensagem"
        type="text"
        placeholder="Selecione um grupo primeiro"
        autocomplete="off"
        disabled
      >
      <button id="btn-enviar" type="submit" disabled>Enviar</button>
    </form>
  </section>

  <script src="{% static 'conversationapp/js/conversas.js' %}?v=7"></script>
</body>
</html>
